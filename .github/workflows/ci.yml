name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  check:
    name: moon check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit Registry
        run: moon update

      - name: Run moon check
        run: moon check

  prove:
    name: moon prove (formal verification)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      # 🌟 核心修复：同时安装 why3 和数学求解器 z3
      - name: Install Why3 / Z3
        run: |
          sudo apt-get update -y
          sudo apt-get install -y why3 z3

      - name: Detect Why3 provers
        run: why3 config detect

      - name: Update MoonBit Registry
        run: moon update

      - name: Run moon prove
        run: moon prove

  test:
    name: moon test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit Registry
        run: moon update

      - name: Run moon test
        run: moon test -v --target native